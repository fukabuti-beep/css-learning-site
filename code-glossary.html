<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>コード用語辞典 | CSS学習</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700;900&family=Fira+Code:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css?v=2.0.2">
  <style>
    /* ── コード辞典専用スタイル ── */
    .code-hero {
      background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #0f1a2e 100%);
      padding: 4rem 1.5rem 3rem;
      text-align: center;
      position: relative;
      overflow: hidden;
    }
    .code-hero::before {
      content: '';
      position: absolute; inset: 0;
      background:
        radial-gradient(ellipse at 20% 50%, rgba(99,102,241,0.15) 0%, transparent 60%),
        radial-gradient(ellipse at 80% 20%, rgba(16,185,129,0.1) 0%, transparent 50%);
    }
    .code-hero-badge {
      display: inline-block;
      background: rgba(99,102,241,0.2);
      border: 1px solid rgba(99,102,241,0.4);
      color: #a5b4fc;
      font-family: 'Fira Code', monospace;
      font-size: 0.75rem;
      padding: 0.3rem 1rem;
      border-radius: 999px;
      margin-bottom: 1rem;
      position: relative;
    }
    .code-hero h1 {
      font-size: clamp(1.8rem, 4vw, 2.8rem);
      font-weight: 900;
      color: #fff;
      margin-bottom: 0.75rem;
      position: relative;
    }
    .code-hero h1 span { color: #818cf8; }
    .code-hero p {
      color: #94a3b8;
      font-size: 1rem;
      max-width: 560px;
      margin: 0 auto 1.5rem;
      position: relative;
      line-height: 1.7;
    }
    .code-search-wrap {
      position: relative;
      max-width: 480px;
      margin: 0 auto;
    }
    .code-search-icon {
      position: absolute; left: 1rem; top: 50%; transform: translateY(-50%);
      font-size: 1rem; pointer-events: none;
    }
    .code-search {
      width: 100%;
      padding: 0.85rem 1rem 0.85rem 2.8rem;
      font-size: 1rem;
      border: 1.5px solid rgba(99,102,241,0.4);
      border-radius: 12px;
      background: rgba(255,255,255,0.06);
      color: #e2e8f0;
      outline: none;
      font-family: 'Fira Code', monospace;
      transition: border-color 0.2s, background 0.2s;
      box-sizing: border-box;
    }
    .code-search::placeholder { color: #64748b; font-family: 'Fira Code', monospace; }
    .code-search:focus {
      border-color: #818cf8;
      background: rgba(255,255,255,0.09);
    }

    .code-main { max-width: 1200px; margin: 0 auto; padding: 2rem 1.5rem 4rem; }

    .code-cats {
      display: flex; flex-wrap: wrap; gap: 0.5rem;
      margin-bottom: 1.5rem;
    }
    .code-cat-btn {
      display: inline-flex; align-items: center; gap: 0.4rem;
      padding: 0.45rem 1rem;
      border: 1.5px solid var(--border);
      border-radius: 999px;
      background: transparent;
      color: var(--text-muted);
      font-size: 0.82rem; font-weight: 500;
      cursor: pointer; transition: all 0.18s;
      font-family: 'Fira Code', monospace;
    }
    .code-cat-btn:hover { border-color: #818cf8; color: #818cf8; }
    .code-cat-btn.active {
      border-color: #818cf8; background: rgba(99,102,241,0.12);
      color: #818cf8;
    }

    .code-count {
      color: var(--text-muted); font-size: 0.82rem;
      margin-bottom: 1.25rem;
      font-family: 'Fira Code', monospace;
    }

    .code-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 1.25rem;
    }

    .code-card {
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: 14px;
      padding: 1.4rem 1.5rem;
      transition: border-color 0.2s, box-shadow 0.2s, transform 0.2s;
      position: relative;
      overflow: hidden;
    }
    .code-card::before {
      content: '';
      position: absolute; top: 0; left: 0; right: 0; height: 3px;
      background: var(--card-accent, linear-gradient(90deg, #818cf8, #6366f1));
      opacity: 0; transition: opacity 0.2s;
    }
    .code-card:hover {
      border-color: #818cf8;
      box-shadow: 0 8px 24px rgba(99,102,241,0.12);
      transform: translateY(-2px);
    }
    .code-card:hover::before { opacity: 1; }

    .code-card-header {
      display: flex; align-items: flex-start;
      justify-content: space-between; gap: 0.75rem;
      margin-bottom: 0.75rem;
    }
    .code-card-term {
      font-family: 'Fira Code', monospace;
      font-size: 1.05rem;
      font-weight: 700;
      color: #818cf8;
      line-height: 1.3;
      flex: 1;
    }
    .code-card-cat {
      display: inline-block;
      font-size: 0.72rem;
      padding: 0.2rem 0.6rem;
      border-radius: 6px;
      background: rgba(99,102,241,0.1);
      color: #a5b4fc;
      border: 1px solid rgba(99,102,241,0.2);
      white-space: nowrap;
      flex-shrink: 0;
      font-family: 'Fira Code', monospace;
    }
    .code-card-en {
      font-family: 'Fira Code', monospace;
      font-size: 0.78rem;
      color: var(--text-muted);
      margin-bottom: 0.6rem;
    }
    .code-card-def {
      font-size: 0.875rem;
      color: var(--text-body);
      line-height: 1.75;
    }
    .code-card-def code {
      font-family: 'Fira Code', monospace;
      font-size: 0.83em;
      background: rgba(99,102,241,0.08);
      border: 1px solid rgba(99,102,241,0.15);
      padding: 0.1em 0.4em;
      border-radius: 4px;
      color: #a5b4fc;
    }
    .code-card-example {
      margin-top: 0.85rem;
      background: #0f172a;
      border: 1px solid rgba(99,102,241,0.2);
      border-radius: 8px;
      padding: 0.75rem 1rem;
      font-family: 'Fira Code', monospace;
      font-size: 0.8rem;
      color: #94a3b8;
      line-height: 1.6;
      overflow-x: auto;
    }
    .code-card-example .kw { color: #c084fc; }   /* keyword / property */
    .code-card-example .val { color: #34d399; }  /* value */
    .code-card-example .sel { color: #fb923c; }  /* selector */
    .code-card-example .cmt { color: #475569; font-style: italic; }
    .code-card-example .tag { color: #f472b6; }  /* HTML tag */
    .code-card-example .attr { color: #fb923c; } /* attribute */
    .code-card-example .str { color: #34d399; }  /* string */
    .code-card-example .num { color: #818cf8; }  /* number/unit */
    .code-card-example .fn { color: #22d3ee; }   /* function */

    .code-empty {
      display: none;
      text-align: center; padding: 4rem 1.5rem;
      color: var(--text-muted); grid-column: 1/-1;
    }

    /* ── Related link ── */
    .code-card-link {
      display: inline-flex; align-items: center; gap: 0.3rem;
      margin-top: 0.75rem;
      font-size: 0.8rem;
      color: #818cf8;
      text-decoration: none;
      font-family: 'Fira Code', monospace;
    }
    .code-card-link:hover { text-decoration: underline; }

    @media (max-width: 640px) {
      .code-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>

  <div class="code-hero">
    <div class="code-hero-badge">/* CODE REFERENCE */</div>
    <h1>💻 コード<span>専用</span>用語辞典</h1>
    <p>HTML・CSSのコード構文・記号・関数・単位など、コードを読み書きするために必要な用語を完全解説。コード例付きで直感的に理解できます。</p>
    <div class="code-search-wrap">
      <span class="code-search-icon">🔍</span>
      <input class="code-search" id="code-search" type="text"
        placeholder="用語を検索… (例: :root, calc, @media)">
    </div>
  </div>

  <div class="code-main">
    <div class="code-cats" id="code-cats">
      <button class="code-cat-btn active" data-cat="all">📋 すべて</button>
      <button class="code-cat-btn" data-cat="HTML構文">🏷️ HTML構文</button>
      <button class="code-cat-btn" data-cat="CSS構文">🎨 CSS構文</button>
      <button class="code-cat-btn" data-cat="記号・構造">⚙️ 記号・構造</button>
      <button class="code-cat-btn" data-cat="単位・数値">📐 単位・数値</button>
      <button class="code-cat-btn" data-cat="CSS関数">🔧 CSS関数</button>
      <button class="code-cat-btn" data-cat="アットルール">@ アットルール</button>
      <button class="code-cat-btn" data-cat="色の指定">🎨 色の指定</button>
      <button class="code-cat-btn" data-cat="開発ツール">🛠️ 開発ツール</button>
    </div>

    <div class="code-count" id="code-count"></div>

    <div class="code-grid" id="code-grid"></div>
    <div class="code-empty" id="code-empty">
      <div style="font-size:3rem; margin-bottom:1rem;">🔍</div>
      <p>「<span id="code-empty-q"></span>」に一致する用語が見つかりませんでした。</p>
    </div>
  </div>

  <footer style="border-top:1px solid var(--border); padding:2rem 1.5rem; text-align:center; color:var(--text-dim); font-size:0.85rem;">
    <p><a href="index.html" style="color:var(--primary);">&lt;/CSS学習&gt;</a> — Webデザイナー向けCSS学習サイト &nbsp;|&nbsp; <span class="footer-producer">Produced by Sumeragi</span></p>
  </footer>

  <script src="js/main.js?v=2.0.2"></script>
  <script>
    // ===================================
    // コード専用用語辞典データ
    // ===================================
    const CODE_GLOSSARY = [

      // ── HTML構文 ──
      {
        term: 'DOCTYPE宣言',
        en: '<!DOCTYPE html>',
        cat: 'HTML構文',
        def: 'HTMLファイルの<strong>最初の1行目</strong>に必ず書く宣言。ブラウザに「このファイルはHTML5で書かれています」と伝えます。これがないと<em>互換モード（Quirks Mode）</em>で動作し、レイアウトが崩れる原因になります。',
        example: '<span class="tag">&lt;!DOCTYPE html&gt;</span>\n<span class="tag">&lt;html</span> <span class="attr">lang</span>=<span class="str">"ja"</span><span class="tag">&gt;</span>',
        link: 'lessons/01-html-basics.html'
      },
      {
        term: '開始タグ・終了タグ',
        en: 'Opening Tag / Closing Tag',
        cat: 'HTML構文',
        def: '開始タグは <code>&lt;p&gt;</code> のように<code>&lt;タグ名&gt;</code>の形式。終了タグは <code>&lt;/p&gt;</code> のように<code>&lt;/タグ名&gt;</code>の形式。ほとんどの要素は開始タグと終了タグのペアで使います。',
        example: '<span class="tag">&lt;p&gt;</span>これが段落テキストです。<span class="tag">&lt;/p&gt;</span>\n<span class="tag">&lt;h1&gt;</span>ページタイトル<span class="tag">&lt;/h1&gt;</span>',
        link: 'lessons/01-html-basics.html'
      },
      {
        term: '空要素（自己閉じタグ）',
        en: 'Void Element / Self-closing Tag',
        cat: 'HTML構文',
        def: '終了タグを持たないHTML要素。<code>&lt;img&gt;</code>、<code>&lt;input&gt;</code>、<code>&lt;br&gt;</code>、<code>&lt;hr&gt;</code>、<code>&lt;meta&gt;</code>、<code>&lt;link&gt;</code> などがあります。中に内容（テキスト・子要素）を持てません。',
        example: '<span class="tag">&lt;img</span> <span class="attr">src</span>=<span class="str">"photo.jpg"</span> <span class="attr">alt</span>=<span class="str">"写真"</span><span class="tag">&gt;</span>\n<span class="tag">&lt;br&gt;</span>\n<span class="tag">&lt;input</span> <span class="attr">type</span>=<span class="str">"text"</span><span class="tag">&gt;</span>',
        link: 'lessons/01-html-basics.html'
      },
      {
        term: '属性（attribute）',
        en: 'HTML Attribute',
        cat: 'HTML構文',
        def: 'HTMLタグに追加情報を与える設定値。<code>属性名="値"</code>の形式で<strong>開始タグの中</strong>に書きます。例：<code>href</code>（リンク先）、<code>src</code>（ソース）、<code>class</code>（CSSクラス）、<code>id</code>（識別子）。',
        example: '<span class="tag">&lt;a</span> <span class="attr">href</span>=<span class="str">"https://example.com"</span> <span class="attr">target</span>=<span class="str">"_blank"</span><span class="tag">&gt;</span>リンク<span class="tag">&lt;/a&gt;</span>',
        link: 'lessons/01-html-basics.html'
      },
      {
        term: 'id属性',
        en: 'id attribute',
        cat: 'HTML構文',
        def: 'ページ内で<strong>1回しか使えない</strong>一意の識別子を付ける属性。CSSでは <code>#id名</code>、JavaScriptでは <code>getElementById("id名")</code> で取得。ページ内リンク（<code>href="#id名"</code>）にも使います。',
        example: '<span class="tag">&lt;section</span> <span class="attr">id</span>=<span class="str">"about"</span><span class="tag">&gt;</span>...<span class="tag">&lt;/section&gt;</span>\n\n<span class="cmt">/* CSS */</span>\n<span class="sel">#about</span> { <span class="kw">background</span>: <span class="val">#f0f4ff</span>; }',
        link: 'lessons/03-selectors.html'
      },
      {
        term: 'class属性',
        en: 'class attribute',
        cat: 'HTML構文',
        def: '複数の要素に同じスタイルを適用するための分類名。<strong>同じclass名を何度でも</strong>使えます。CSSでは <code>.class名</code> で選択。スペース区切りで複数のクラスを同時に指定できます。',
        example: '<span class="tag">&lt;p</span> <span class="attr">class</span>=<span class="str">"card featured"</span><span class="tag">&gt;</span>内容<span class="tag">&lt;/p&gt;</span>\n\n<span class="cmt">/* CSS */</span>\n<span class="sel">.card</span> { <span class="kw">border-radius</span>: <span class="val">8px</span>; }\n<span class="sel">.featured</span> { <span class="kw">background</span>: <span class="val">#fef3c7</span>; }',
        link: 'lessons/03-selectors.html'
      },
      {
        term: 'data属性',
        en: 'data-* attribute',
        cat: 'HTML構文',
        def: '独自のデータをHTML要素に埋め込むための属性。<code>data-任意の名前="値"</code>の形式。JavaScriptから <code>element.dataset.名前</code> でアクセスできます。CSSの属性セレクターでスタイルを当てることも可能です。',
        example: '<span class="tag">&lt;button</span> <span class="attr">data-color</span>=<span class="str">"primary"</span> <span class="attr">data-size</span>=<span class="str">"lg"</span><span class="tag">&gt;</span>\n  クリック\n<span class="tag">&lt;/button&gt;</span>\n\n<span class="cmt">// JavaScript</span>\nbtn.dataset.color; <span class="cmt">// "primary"</span>',
        link: 'lessons/01-html-basics.html'
      },
      {
        term: 'パス（相対・絶対）',
        en: 'Relative / Absolute Path',
        cat: 'HTML構文',
        def: '<strong>絶対パス</strong>はURLのフル指定（<code>https://...</code> または <code>/</code>から始まる）。<strong>相対パス</strong>は現在のファイルからの位置（<code>../</code>は1つ上のフォルダ、<code>./</code>は同じフォルダ）。',
        example: '<span class="cmt">&lt;!-- 絶対パス --&gt;</span>\n<span class="tag">&lt;img</span> <span class="attr">src</span>=<span class="str">"https://example.com/img.jpg"</span><span class="tag">&gt;</span>\n<span class="tag">&lt;img</span> <span class="attr">src</span>=<span class="str">"/images/img.jpg"</span><span class="tag">&gt;</span>\n\n<span class="cmt">&lt;!-- 相対パス --&gt;</span>\n<span class="tag">&lt;img</span> <span class="attr">src</span>=<span class="str">"../images/img.jpg"</span><span class="tag">&gt;</span>',
        link: 'lessons/01-html-basics.html'
      },

      // ── CSS構文 ──
      {
        term: 'セレクター',
        en: 'CSS Selector',
        cat: 'CSS構文',
        def: 'スタイルを<strong>どのHTML要素に適用するか</strong>を指定するパターン。ルールセットの <code>{</code> の前の部分です。要素名・クラス・ID・属性・状態など様々な種類があります。',
        example: '<span class="sel">h1</span> { ... }          <span class="cmt">/* 要素セレクター */</span>\n<span class="sel">.card</span> { ... }      <span class="cmt">/* クラスセレクター */</span>\n<span class="sel">#hero</span> { ... }      <span class="cmt">/* IDセレクター */</span>\n<span class="sel">a:hover</span> { ... }    <span class="cmt">/* 疑似クラス */</span>\n<span class="sel">p::before</span> { ... }  <span class="cmt">/* 疑似要素 */</span>',
        link: 'lessons/03-selectors.html'
      },
      {
        term: 'プロパティ',
        en: 'CSS Property',
        cat: 'CSS構文',
        def: 'CSS宣言の中で「<strong>何を変えるか</strong>」を指定するキーワード。コロン（<code>:</code>）の左側に書きます。例：<code>color</code>（文字色）、<code>font-size</code>（文字サイズ）、<code>margin</code>（余白）など200以上あります。',
        example: '<span class="sel">p</span> {\n  <span class="kw">color</span>: <span class="val">red</span>;           <span class="cmt">/* color がプロパティ */</span>\n  <span class="kw">font-size</span>: <span class="val">1rem</span>;     <span class="cmt">/* font-size がプロパティ */</span>\n  <span class="kw">margin-bottom</span>: <span class="val">1rem</span>; <span class="cmt">/* margin-bottom がプロパティ */</span>\n}',
        link: 'lessons/02-css-intro.html'
      },
      {
        term: '値（バリュー）',
        en: 'CSS Value',
        cat: 'CSS構文',
        def: 'CSSプロパティに対して「<strong>どのように変えるか</strong>」を指定する部分。コロン（<code>:</code>）の右側に書きます。数値・単位・キーワード・関数など様々な形式があります。',
        example: '<span class="sel">h1</span> {\n  <span class="kw">color</span>: <span class="val">#ff0000</span>;      <span class="cmt">/* 16進数カラー */</span>\n  <span class="kw">font-size</span>: <span class="val">2rem</span>;     <span class="cmt">/* 数値＋単位 */</span>\n  <span class="kw">text-align</span>: <span class="val">center</span>;  <span class="cmt">/* キーワード */</span>\n  <span class="kw">width</span>: <span class="fn">calc</span>(<span class="val">100% - 2rem</span>); <span class="cmt">/* 関数 */</span>\n}',
        link: 'lessons/02-css-intro.html'
      },
      {
        term: '宣言',
        en: 'CSS Declaration',
        cat: 'CSS構文',
        def: '<code>プロパティ: 値;</code> の1セット。セミコロン（<code>;</code>）で終わります。ルールセットの波括弧内に書き、複数並べることができます。宣言1つが「スタイルの1命令」に相当します。',
        example: '<span class="sel">button</span> {\n  <span class="kw">background</span>: <span class="val">#6366f1</span>;  <span class="cmt">← 宣言1つ</span>\n  <span class="kw">color</span>: <span class="val">white</span>;          <span class="cmt">← 宣言1つ</span>\n  <span class="kw">padding</span>: <span class="val">0.5rem 1rem</span>;  <span class="cmt">← 宣言1つ</span>\n}',
        link: 'lessons/02-css-intro.html'
      },
      {
        term: 'ルールセット',
        en: 'Rule Set',
        cat: 'CSS構文',
        def: 'セレクターと波括弧で囲まれた宣言のまとまり。CSSの基本単位です。1つのルールセットに複数の宣言を書けます。セレクターをカンマで区切ると複数の要素に同じスタイルを適用できます。',
        example: '<span class="cmt">/* ルールセット全体 */</span>\n<span class="sel">h1, h2, h3</span> {           <span class="cmt">← セレクター</span>\n  <span class="kw">font-weight</span>: <span class="val">bold</span>;   <span class="cmt">← 宣言</span>\n  <span class="kw">color</span>: <span class="val">#1e293b</span>;     <span class="cmt">← 宣言</span>\n}                        <span class="cmt">← ここまでがルールセット</span>',
        link: 'lessons/02-css-intro.html'
      },
      {
        term: 'ショートハンド',
        en: 'CSS Shorthand Property',
        cat: 'CSS構文',

    // ===================================
    // レンダリング
    // ===================================
    let currentCat = 'all';
    let currentQ = '';

    function escapeHtml(str) {
      return str
        .replace(/&lt;/g, '<').replace(/&gt;/g, '>')  // already HTML
        .replace(/</g, '&lt;').replace(/>/g, '&gt;'); // encode for safety if needed
    }

    function renderCodeGlossary() {
      const grid = document.getElementById('code-grid');
      const empty = document.getElementById('code-empty');
      const count = document.getElementById('code-count');
      const emptyQ = document.getElementById('code-empty-q');

      const q = currentQ.toLowerCase();
      const filtered = CODE_GLOSSARY.filter(item => {
        const catOK = currentCat === 'all' || item.cat === currentCat;
        const qOK = !q ||
          item.term.toLowerCase().includes(q) ||
          (item.en && item.en.toLowerCase().includes(q)) ||
          item.def.toLowerCase().includes(q);
        return catOK && qOK;
      });

      if (filtered.length === 0) {
        grid.style.display = 'none';
        empty.style.display = 'block';
        emptyQ.textContent = currentQ;
        count.textContent = '0 件の用語';
        return;
      }

      grid.style.display = '';
      empty.style.display = 'none';
      count.textContent = `${filtered.length} 件のコード用語`;

      grid.innerHTML = filtered.map(item => `
        <div class="code-card" id="code-${item.term.replace(/[^a-zA-Z0-9]/g, '-')}">
          <div class="code-card-header">
            <div class="code-card-term">${item.term}</div>
            <span class="code-card-cat">${item.cat}</span>
          </div>
          ${item.en ? `<div class="code-card-en">// ${item.en}</div>` : ''}
          <div class="code-card-def">${item.def}</div>
          ${item.example ? `<div class="code-card-example">${item.example}</div>` : ''}
          ${item.link ? `<a class="code-card-link" href="${item.link}">📖 関連レッスン →</a>` : ''}
        </div>`).join('');
    }

    document.getElementById('code-search').addEventListener('input', function () {
      currentQ = this.value;
      renderCodeGlossary();
    });

    document.getElementById('code-cats').addEventListener('click', function (e) {
      const btn = e.target.closest('.code-cat-btn');
      if (!btn) return;
      document.querySelectorAll('.code-cat-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentCat = btn.dataset.cat;
      renderCodeGlossary();
    });

    document.addEventListener('DOMContentLoaded', renderCodeGlossary);
  </script>
